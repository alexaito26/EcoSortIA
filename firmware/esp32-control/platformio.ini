; EcoSort AI - Firmware de control ESP32 (PlatformIO)
; La implementacion completa (WiFi, UART, HTTPS, servo, sensores, TFT,
; maquina de estados, cola offline, reintentos) corresponde a la Fase 6.
; No incluir credenciales aqui: usar un archivo secrets no versionado.

[platformio]
default_envs = esp32dev

[env:esp32dev]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
build_flags =
    -D CORE_DEBUG_LEVEL=3
